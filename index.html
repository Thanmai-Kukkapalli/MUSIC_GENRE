<!doctype html>
<html>
  <head>
    <title>Music Genre Classifier</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #1e3c72, #2a5298);
        text-align: center;
        color: white;
        margin: 0;
        padding: 0;
      }

      .container {
        width: 50%;
        margin: 80px auto;
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      }

      h1 {
        font-size: 40px;
      }

      input {
        width: 60%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 18px;
      }

      button {
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        background-color: #ff9800;
        color: white;
        font-size: 18px;
        cursor: pointer;
      }

      button:hover {
        background-color: #e68900;
      }

      h2 {
        margin-top: 30px;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        background: rgba(255, 255, 255, 0.2);
        margin: 10px;
        padding: 12px;
        border-radius: 10px;
        font-size: 18px;
      }

      .genres {
        margin-top: 20px;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🎵 Music Genre Classifier 🎵</h1>

      <p>Find Telugu, Hindi & English songs by genre</p>

      <form method="POST">
        <input
          type="text"
          name="genre"
          placeholder="Enter genre (pop, rock, party...)"
        />

        <button type="submit">Search</button>
      </form>

      <div class="genres">
        <p><b>Available Genres:</b></p>
        pop | rock | romantic | party | sad
      </div>

      <h2>🎶 Songs:</h2>

      <ul>
        {% for song in songs %}
        <li>{{ song }}</li>
        {% endfor %}
      </ul>
    </div>
  </body>
</html>
